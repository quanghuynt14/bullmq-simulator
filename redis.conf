# ============================
# Redis persistence settings
# ============================

# RDB snapshots: save the DB every 20 seconds if at least 1 keys changed
save 20 1

# Append Only File (AOF) persistence: enables durability
appendonly yes

# AOF fsync policy: flush changes to disk every second
appendfsync everysec

# AOF rewrite to optimize file size
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ============================
# Data storage
# ============================

# Where to store RDB and AOF files
dir /data

# ============================
# Memory management
# ============================

# Memory limit 
maxmemory 2gb

# Do not evict keys when memory limit is reached
maxmemory-policy noeviction

# ============================
# Logging
# ============================

# Set log verbosity to warnings and errors only
loglevel warning

# ============================
# Slow log
# ============================

# Log queries slower than 10ms
slowlog-log-slower-than 10000

# Keep last 128 slow queries
slowlog-max-len 128
